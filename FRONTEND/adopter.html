<style>
body {
    font-family: 'Segoe UI', sans-serif;

}

.header a {
    margin: 0 10px;
    text-decoration: none;
    color: #5a5a5a;

}

.header a:hover {
    color: #2c5e2a;
}

.container {
    max-width: 1000px;

}

}
