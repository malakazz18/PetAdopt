<header class="header">
    <nav class="nav">
        <div class="logo">

<div class="container">
    <h1>📞 Contact</h1>

    <div class="card">
        <h3>📍 Nos coordonnées</h3>
        <p>📍 Tunisie</p>
        <p>📞 20 123 456</p>
        <p>📧 petadoption@gmail.com</p>
    </div>

    <div class="card">
        <h3>📩 Envoyer un message</h3>
        <form id="contactForm">
            <input type="text" id="name" placeholder="Votre nom">
            <span id="nameError" class="error"></span>

            <input type="email" id="email" placeholder="Votre email">
            <span id="emailError" class="error"></span>

            <textarea id="message" rows="5" placeholder="Votre message"></textarea>
            <span id="messageError" class="error"></span>

            <button type="submit">Envoyer</button>
        </form>
    </div>
</div>

<footer class="footer">
    <p>🐾 PetAdoption - Refuge pour animaux en Tunisie</p>
    <p>📍 Tunisie | 📞 20 123 456 | ✉️ petadoption@gmail.com</p>
</footer>

<script>
    document.getElementById("contactForm").addEventListener("submit", function(e) {
        e.preventDefault();
        let valid = true;
        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const message = document.getElementById("message").value.trim();

        document.getElementById("nameError").textContent = "";
        document.getElementById("emailError").textContent = "";
        document.getElementById("messageError").textContent = "";

        if (name === "") {
            document.getElementById("nameError").textContent = "Nom obligatoire";
            valid = false;
        }

        if (email === "") {
            document.getElementById("emailError").textContent = "Email obligatoire";
            valid = false;
        } else if (!email.includes("@")) {
            document.getElementById("emailError").textContent = "Email invalide";
            valid = false;
        }

        if (message === "") {
            document.getElementById("messageError").textContent = "Message obligatoire";
            valid = false;
        }

        if (valid) {
            alert("✅ Message envoyé avec succès !");
            document.getElementById("contactForm").reset();
        }
    });
</script>

</body>
